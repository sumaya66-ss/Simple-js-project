<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link href="./output.css" rel="stylesheet">

    <title>counter</title>
</head>
<body class="text-center flex justify-center h-screen bg-gray-100">
    <div class="">
        <p id="count" class=" text-3xl mb-4"> 0</p>
        <input type="number" id="step" value="1" class="border p-2 mb-4 w-20 text-center">
        <div class="space-x-2">
            <button onclick="change(-1)" class="py-2 px-4 bg-red-500 text-2xl cursor-pointer text-white rounded">-</button>
            <button onclick="change(1)" class="py-2 px-4 bg-green-500 text-2xl cursor-pointer text-white rounded">+</button>
        </div>
    </div>

    <script>
        let count = 0;
        function change(step){
            const stepValue = Number( document.getElementById("step").value);
            count += step * stepValue;
            document.getElementById("count").textContent = count;
            
        }
        
    </script>
    
    
</body>
</html>
