<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./output.css" rel="stylesheet">
    <title>Counter project</title>
</head>
<body id="body" class="flex items-center justify-center h-screen ">
    <div class="bg-white p-6 rounded shadow text-center"> 
        <p id="code" class="mb-4 ">#ffffff</p>
         <div class="space-x-2">
        <button onclick="change()" class="px-4 py-2 bg-black text-white rounded cursor-pointer">Change</button>
    </div>
    </div>
   

    
</body>
<script>
    function change(){
        const color ="#" + Math.floor(Math.random()*1677215).toString(16).padStart(6,"0")
        console.log(color)
        document.getElementById("body").style.background=color;
        document.getElementById("code").innerText=color;
        
       }

</script>
</html>
